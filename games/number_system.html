<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Sets Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #e0f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        
        h1 {
            color: #006064;
            margin-bottom: 5px;
            margin-top: 60px; /* Ensures title is clear of buttons */
        }

        .instructions {
            color: #00796b;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* --- THE BACK TO MENU BUTTON --- */
        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #ff9800;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.3s;
            z-index: 999; 
        }

        #back-btn:hover {
            background-color: #f57c00;
            transform: scale(1.05);
        }

        /* --- THE SOUND BUTTON --- */
        #sound-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #00796b;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
            z-index: 999;
        }
        
        #sound-toggle.muted {
            background-color: #9e9e9e;
        }

        /* Phase 1: Drag and Drop Styles */
        #phase-1 {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #number-box {
            width: 80%;
            max-width: 600px;
            height: 250px;
            border: 5px dashed #009688;
            border-radius: 20px;
            background-color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        #box-label {
            font-size: 32px;
            font-weight: bold;
            color: #00796b;
            margin-bottom: 20px;
            transition: color 0.5s ease;
        }

        #box-contents {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #424242;
        }

        #draggables {
            min-height: 120px;
            margin-top: 50px;
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
        }

        .drag-item {
            width: 100px;
            height: 100px;
            background-color: #ff9800;
            color: white;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            cursor: pointer; 
            user-select: none;
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
            transition: transform 0.2s;
            touch-action: manipulation; /* Helps with smartboard touch */
        }

        .drag-item:hover { transform: scale(1.1); }

        /* Phase 2: Quiz Styles */
        #phase-2 {
            display: none; 
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            animation: fadeIn 1s;
        }

        #quiz-number {
            font-size: 80px;
            font-weight: bold;
            color: #d32f2f;
            background: white;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }

        .quiz-btn {
            font-size: 20px;
            padding: 15px 25px;
            border: 4px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: all 0.2s ease;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            opacity: 0.7;
        }

        .quiz-btn.selected {
            opacity: 1;
            transform: scale(1.1);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        .btn-natural { background-color: #4caf50; }
        .btn-whole { background-color: #ff9800; }
        .btn-integer { background-color: #2196f3; }

        #submit-btn {
            font-size: 24px;
            padding: 15px 40px;
            background-color: #673ab7;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(103, 58, 183, 0.4);
            transition: transform 0.2s;
        }

        #submit-btn:hover { transform: translateY(-3px); }

        /* Shared Styles */
        .hidden { display: none !important; }

        .celebrate {
            animation: pop 0.5s ease-out;
            background-color: #e8f5e9 !important;
            border-color: #4caf50 !important;
        }

        #message-area {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            min-height: 40px;
        }

        .success-text { color: #2e7d32; }
        .error-text { color: #c62828; animation: shake 0.4s; }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <a href="../index.html" id="back-btn">⬅️ Back to Menu</a>
    <button id="sound-toggle" onclick="toggleSound()">🔊 Sound On</button>

    <h1>ਸੰਖਿਆਵਾਂ ਦੀ ਖੇਡ (Number Sets)</h1>
    <div id="main-instructions" class="instructions">ਬਲਾਕ ਨੂੰ ਬਕਸੇ ਵਿੱਚ ਖਿੱਚੋ ਜਾਂ ਇਸ 'ਤੇ ਕਲਿੱਕ ਕਰੋ</div>

    <div id="phase-1">
        <div id="number-box" ondrop="drop(event)" ondragover="allowDrop(event)">
            <div id="box-label">ਪ੍ਰਾਕ੍ਰਿਤਕ ਸੰਖਿਆਵਾਂ</div>
            <div id="box-contents">1, 2, 3, 4, 5, ...</div>
        </div>

        <div id="draggables">
            <div class="drag-item" id="block-zero" draggable="true" ondragstart="drag(event)" onclick="handleTap('block-zero')">
                0
            </div>
            <div class="drag-item hidden" id="block-negatives" draggable="true" ondragstart="drag(event)" onclick="handleTap('block-negatives')" style="background-color: #f44336;">
                -1, -2...
            </div>
        </div>
    </div>

    <div id="phase-2">
        <div id="quiz-number">5</div>
        <div class="button-container">
            <button id="btn-natural" class="quiz-btn btn-natural" onclick="toggleSelection('natural')">ਪ੍ਰਾਕ੍ਰਿਤਕ (Natural)</button>
            <button id="btn-whole" class="quiz-btn btn-whole" onclick="toggleSelection('whole')">ਪੂਰਨ (Whole)</button>
            <button id="btn-integer" class="quiz-btn btn-integer" onclick="toggleSelection('integer')">ਸੰਪੂਰਨ (Integer)</button>
        </div>
        <button id="submit-btn" onclick="checkAnswers()">ਜਵਾਬ ਚੈੱਕ ਕਰੋ (Check Answer)</button>
    </div>

    <div id="message-area"></div>

    <script>
        // --- AUDIO SYNTHESIS SYSTEM (WITH SAFETY CATCH) ---
        let audioCtx;
        let soundEnabled = true;

        function initAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch (e) {
                console.log("Audio not supported or blocked by browser.", e);
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById("sound-toggle");
            if (soundEnabled) {
                btn.innerText = "🔊 Sound On";
                btn.classList.remove("muted");
                initAudio(); 
            } else {
                btn.innerText = "🔇 Sound Off";
                btn.classList.add("muted");
            }
        }

        function playSound(type) {
            if (!soundEnabled) return;
            
            try {
                initAudio();
                if (!audioCtx) return;

                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                const now = audioCtx.currentTime;

                if (type === 'pop') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(600, now);
                    oscillator.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                    gainNode.gain.setValueAtTime(1, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    oscillator.start(now);
                    oscillator.stop(now + 0.1);
                } 
                else if (type === 'correct') {
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(523.25, now); 
                    oscillator.frequency.setValueAtTime(659.25, now + 0.1); 
                    gainNode.gain.setValueAtTime(0.5, now);
                    gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                    oscillator.start(now);
                    oscillator.stop(now + 0.4);
                } 
                else if (type === 'wrong') {
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(150, now);
                    oscillator.frequency.linearRampToValueAtTime(100, now + 0.3);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                    oscillator.start(now);
                    oscillator.stop(now + 0.3);
                }
                else if (type === 'click') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(800, now);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    oscillator.start(now);
                    oscillator.stop(now + 0.05);
                }
                else if (type === 'victory') {
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(523.25, now); 
                    oscillator.frequency.setValueAtTime(659.25, now + 0.15); 
                    oscillator.frequency.setValueAtTime(783.99, now + 0.3); 
                    oscillator.frequency.setValueAtTime(1046.50, now + 0.45); 
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
                    oscillator.start(now);
                    oscillator.stop(now + 0.8);
                }
            } catch (e) {
                console.log("Sound failed to play.", e);
            }
        }

        // --- PHASE 1 LOGIC (Fixed for older browsers) ---
        let currentStep = 1; 

        function allowDrop(event) { event.preventDefault(); }
        
        function drag(event) { 
            // Using "text" instead of "text/plain" for maximum compatibility with older boards
            event.dataTransfer.setData("text", event.target.id); 
        }
        
        function drop(event) {
            event.preventDefault();
            // Get data safely using either format
            const data = event.dataTransfer.getData("text") || event.dataTransfer.getData("text/plain");
            processGameLogic(data);
        }
        
        function handleTap(clickedId) { processGameLogic(clickedId); }

        function processGameLogic(itemId) {
            const numberBox = document.getElementById("number-box");
            const boxLabel = document.getElementById("box-label");
            const boxContents = document.getElementById("box-contents");
            const elementToMove = document.getElementById(itemId);
            const msgArea = document.getElementById("message-area");

            if (!elementToMove) return; 

            if (itemId === "block-zero" && currentStep === 1) {
                currentStep = 2; 
                boxLabel.innerText = "ਪੂਰਨ ਸੰਖਿਆਵਾਂ";
                boxContents.innerText = "0, 1, 2, 3, 4, 5, ...";
                elementToMove.classList.add("hidden");
                document.getElementById("block-negatives").classList.remove("hidden");
                triggerCelebration(numberBox);
                playSound('pop'); 
            } 
            else if (itemId === "block-negatives" && currentStep === 2) {
                currentStep = 3; 
                boxLabel.innerText = "ਸੰਪੂਰਨ ਸੰਖਿਆਵਾਂ";
                boxContents.innerText = "..., -3, -2, -1, 0, 1, 2, 3, ...";
                elementToMove.classList.add("hidden");
                triggerCelebration(numberBox);
                playSound('pop'); 
                
                msgArea.innerHTML = "<span class='success-text'>ਸ਼ਾਬਾਸ਼! ਹੁਣ ਆਓ ਤੁਹਾਡਾ ਟੈਸਟ ਲਈਏ... (Get ready for the quiz!)</span>";
                
                setTimeout(startQuiz, 3000);
            }
        }

        function triggerCelebration(boxElement) {
            boxElement.classList.remove("celebrate");
            void boxElement.offsetWidth;
            boxElement.classList.add("celebrate");
        }

        // --- PHASE 2 LOGIC (THE MULTI-SELECT QUIZ) ---
        const quizNumbers = [15, 0, -4, 7, -99];
        let currentQuestionIndex = 0;
        let selectedAnswers = [];
        let correctAnswersForCurrent = [];

        function startQuiz() {
            document.getElementById("phase-1").style.display = "none";
            document.getElementById("phase-2").style.display = "flex";
            document.getElementById("main-instructions").innerText = "ਉਹ ਸਾਰੇ ਸਮੂਹ ਚੁਣੋ ਜਿਨ੍ਹਾਂ ਵਿੱਚ ਇਹ ਸੰਖਿਆ ਆਉਂਦੀ ਹੈ (Select ALL sets this belongs to)";
            document.getElementById("message-area").innerHTML = ""; 
            
            loadQuestion();
        }

        function loadQuestion() {
            selectedAnswers = [];
            document.getElementById("btn-natural").classList.remove("selected");
            document.getElementById("btn-whole").classList.remove("selected");
            document.getElementById("btn-integer").classList.remove("selected");
            document.getElementById("message-area").innerHTML = "";

            if (currentQuestionIndex < quizNumbers.length) {
                let currentNum = quizNumbers[currentQuestionIndex];
                document.getElementById("quiz-number").innerText = currentNum;

                correctAnswersForCurrent = ['integer']; 
                if (currentNum >= 0) correctAnswersForCurrent.push('whole');
                if (currentNum > 0) correctAnswersForCurrent.push('natural');

            } else {
                document.getElementById("phase-2").style.display = "none";
                document.getElementById("main-instructions").innerText = "ਖੇਡ ਖਤਮ! (Game Over!)";
                document.getElementById("message-area").innerHTML = "<span class='success-text'>ਬਹੁਤ ਵਧੀਆ! ਤੁਸੀਂ ਸਾਰੇ ਜਵਾਬ ਸਹੀ ਦਿੱਤੇ ਹਨ! 🏆🎉</span>";
                playSound('victory'); 
            }
        }

        function toggleSelection(setType) {
            playSound('click'); 
            const btn = document.getElementById("btn-" + setType);
            
            if (selectedAnswers.includes(setType)) {
                selectedAnswers = selectedAnswers.filter(item => item !== setType);
                btn.classList.remove("selected");
            } else {
                selectedAnswers.push(setType);
                btn.classList.add("selected");
            }
        }

        function checkAnswers() {
            const msgArea = document.getElementById("message-area");
            const isCorrectLength = selectedAnswers.length === correctAnswersForCurrent.length;
            const hasAllCorrect = correctAnswersForCurrent.every(val => selectedAnswers.includes(val));

            if (isCorrectLength && hasAllCorrect) {
                playSound('correct'); 
                msgArea.innerHTML = "<span class='success-text'>ਬਿਲਕੁਲ ਸਹੀ! (Correct!) ✨</span>";
                currentQuestionIndex++;
                setTimeout(loadQuestion, 2000); 
            } else {
                playSound('wrong'); 
                msgArea.classList.remove("error-text");
                void msgArea.offsetWidth; 
                msgArea.classList.add("error-text");
                
                if (selectedAnswers.length < correctAnswersForCurrent.length) {
                    msgArea.innerHTML = "<span class='error-text'>ਕੁਝ ਛੁੱਟ ਗਿਆ! ਸਾਰੇ ਸਹੀ ਸਮੂਹ ਚੁਣੋ। (You missed one! Pick all that apply) ❌</span>";
                } else {
                    msgArea.innerHTML = "<span class='error-text'>ਗਲਤ ਚੋਣ! ਦੁਬਾਰਾ ਸੋਚੋ। (Incorrect selection! Think again) ❌</span>";
                }
            }
        }
    </script>

</body>
</html>
