<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORD WAR 2</title>
    <style>
        :root { --p1: #00d2ff; --p2: #ffcc00; }
        body {
            background: #0a0a0a; color: white; margin: 0; overflow: hidden;
            font-family: 'Arial Rounded MT Bold', sans-serif;
            user-select: none; touch-action: none;
        }

        /* Screens */
        .screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            background: #0a0a0a;
        }
        #game-screen { display: none; position: relative; height: 100vh; width: 100vw; }

        /* Floating Hub Button */
        .floating-back {
            position: fixed; top: 10px; left: 10px; z-index: 500;
            background: #006064; color: white; padding: 10px 15px;
            border-radius: 8px; text-decoration: none; font-size: 0.9rem;
            border: 2px solid #00acc1; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #victory-screen {
            display: none; background: rgba(0,0,0,0.95); z-index: 200;
            text-align: center;
        }
        .win-banner { font-size: 6rem; text-shadow: 0 0 30px #fff; margin-bottom: 10px; }
        .win-stats { font-size: 2.5rem; color: #aaa; margin-bottom: 40px; }

        /* Menu Styles */
        h1 { font-size: 5.5rem; color: #ff9800; text-shadow: 5px 5px #000; margin: 0 0 10px; }
        .subtitle { font-size: 1.5rem; color: #888; margin-bottom: 30px; }
        .input-group { display: flex; gap: 20px; margin-bottom: 20px; }
        input { 
            padding: 15px; font-size: 1.5rem; border-radius: 10px; border: none; 
            background: #222; color: white; text-align: center; border: 1px solid #444;
        }
        .menu-btn {
            padding: 20px 40px; font-size: 1.5rem; border-radius: 15px; border: none;
            cursor: pointer; background: #333; color: white; transition: 0.2s;
            text-decoration: none; display: inline-block;
        }
        .menu-btn:hover { transform: scale(1.1); background: #ff9800; color: black; }

        /* Game UI */
        #target-zone {
            height: 25vh; background: #111; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-bottom: 5px solid #ff9800;
        }
        #timer-display { font-size: 2.5rem; color: #ff9800; font-family: monospace; margin-bottom: 5px; }
        #target-emoji { font-size: 7.5rem; line-height: 1; }
        
        .score-box { position: absolute; top: 20px; font-size: 1.8rem; text-align: center; }
        
        #battlefield { display: flex; height: 75vh; }
        .player-lane { position: relative; width: 50%; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; }
        .p1-lane { border-right: 4px solid #333; background: #0b0c16; }
        .p2-lane { background: #160b0b; }

        /* Slots - 4 slots now! */
        .drop-zone { display: flex; gap: 10px; }
        .slot { width: 95px; height: 115px; border: 4px dashed #444; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 4rem; background: rgba(0,0,0,0.5); }
        .slot.filled { border-style: solid; border-color: white; background: rgba(255,255,255,0.15); }
        .slot.highlight { border-color: #fff; background: rgba(255,255,255,0.25); }

        /* Hand */
        .hand { display: flex; gap: 15px; min-height: 130px; align-items: center; }
        .letter-tile { width: 85px; height: 105px; background: #eee; color: #111; font-weight: bold; font-size: 3.5rem; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 5px solid #999; position: relative; cursor: pointer; }
        .letter-tile.dragging { position: fixed; z-index: 9999; pointer-events: none; transform: scale(1.15); box-shadow: 0 15px 50px #000; }
    </style>
</head>
<body>

    <a href="../index.html" class="floating-back">🏠 BACK TO HUB</a>

    <div id="start-screen" class="screen">
        <h1>WORD WAR 2</h1>
        <div class="subtitle">THE 4-LETTER SIEGE</div>
        <div class="input-group">
            <input type="text" id="p1-name-in" placeholder="P1 Name" value="P1">
            <input type="text" id="p2-name-in" placeholder="P2 Name" value="P2">
        </div>
        <div class="btn-group">
            <button class="menu-btn" onclick="startGame(60)">1 MIN BATTLE</button>
            <button class="menu-btn" onclick="startGame(120)">2 MIN BATTLE</button>
        </div>
    </div>

    <div id="victory-screen" class="screen">
        <h2 id="win-text" class="win-banner">P1 WINS!</h2>
        <p id="win-score" class="win-stats">Score: 8 to 4</p>
        <button class="menu-btn" style="background: #ff9800; color: black;" onclick="location.reload()">RE-PLAY</button>
        <a href="Class_Games.html" class="menu-btn" style="background: #006064; margin-top:10px;">EXIT HUB</a>
    </div>

    <div id="game-screen">
        <div id="target-zone">
            <div id="timer-display">00:00</div>
            <div class="score-box" style="left: 40px; color: var(--p1);">
                <div id="p1-name-tag">P1</div>
                <div style="font-size: 3.5rem" id="p1-score">0</div>
            </div>
            <div class="score-box" style="right: 40px; color: var(--p2);">
                <div id="p2-name-tag">P2</div>
                <div style="font-size: 3.5rem" id="p2-score">0</div>
            </div>
            <div id="target-emoji">❓</div>
        </div>

        <div id="battlefield">
            <div class="player-lane p1-lane" id="p1-lane">
                <div class="drop-zone" id="p1-slots">
                    <div class="slot" data-idx="0"></div><div class="slot" data-idx="1"></div>
                    <div class="slot" data-idx="2"></div><div class="slot" data-idx="3"></div>
                </div>
                <div class="hand" id="p1-hand"></div>
            </div>
            <div class="player-lane p2-lane" id="p2-lane">
                <div class="drop-zone" id="p2-slots">
                    <div class="slot" data-idx="0"></div><div class="slot" data-idx="1"></div>
                    <div class="slot" data-idx="2"></div><div class="slot" data-idx="3"></div>
                </div>
                <div class="hand" id="p2-hand"></div>
            </div>
        </div>
    </div>

<script>
    // 100 Common 4-Letter Words
    const dictionary = [
        {w:"BIRD", e:"🐦"}, {w:"FISH", e:"🐟"}, {w:"FROG", e:"🐸"}, {w:"LION", e:"🦁"}, {w:"BEAR", e:"🐻"},
        {w:"DUCK", e:"🦆"}, {w:"DEER", e:"🦌"}, {w:"WOLF", e:"🐺"}, {w:"CRAB", e:"🦀"}, {w:"GOAT", e:"🐐"},
        {w:"BOOK", e:"📖"}, {w:"CAKE", e:"🍰"}, {w:"BALL", e:"⚽"}, {w:"BELL", e:"🔔"}, {w:"BOAT", e:"⛵"},
        {w:"BOMB", e:"💣"}, {w:"DOOR", e:"🚪"}, {w:"DRUM", e:"🥁"}, {w:"FORK", e:"🍴"}, {w:"GIFT", e:"🎁"},
        {w:"LAMP", e:"💡"}, {w:"LOCK", e:"🔒"}, {w:"MASK", e:"🎭"}, {w:"MOON", e:"🌙"}, {w:"RING", e:"💍"},
        {w:"SHOE", e:"👟"}, {w:"SOAP", e:"🧼"}, {w:"STAR", e:"⭐"}, {w:"TENT", e:"⛺"}, {w:"TREE", e:"🌳"},
        {w:"FIRE", e:"🔥"}, {w:"WIND", e:"💨"}, {w:"RAIN", e:"🌧️"}, {w:"SNOW", e:"❄️"}, {w:"LEAF", e:"🍃"},
        {w:"ROSE", e:"🌹"}, {w:"SAND", e:"🏖️"}, {w:"WAVE", e:"🌊"}, {w:"ROCK", e:"🪨"}, {w:"COAL", e:"🕳️"},
        {w:"BLUE", e:"🟦"}, {w:"PINK", e:"🩷"}, {w:"GOLD", e:"🥇"}, {w:"COLD", e:"🥶"}, {w:"FAST", e:"⚡"},
        {w:"SLOW", e:"🐢"}, {w:"HIGH", e:"🏔️"}, {w:"LOUD", e:"📢"}, {w:"SOFT", e:"🧸"}, {w:"HARD", e:"🧱"},
        {w:"COOK", e:"👨‍🍳"}, {w:"DRAW", e:"🎨"}, {w:"EATY", e:"🍴"}, {w:"HELP", e:"🤝"}, {w:"JUMP", e:"🏃"},
        {w:"KICK", e:"🦶"}, {w:"READ", e:"📚"}, {w:"RIDE", e:"🏇"}, {w:"SING", e:"🎤"}, {w:"STOP", e:"🛑"},
        {w:"SWIM", e:"🏊"}, {w:"WALK", e:"🚶"}, {w:"WASH", e:"🧽"}, {w:"WORK", e:"🔨"}, {w:"OPEN", e:"🔓"},
        {w:"BABY", e:"👶"}, {w:"KING", e:"👑"}, {w:"GIRL", e:"👧"}, {w:"TEAM", e:"👫"}, {w:"HAND", e:"✋"},
        {w:"FOOT", e:"👣"}, {w:"NOSE", e:"👃"}, {w:"BACK", e:"🔙"}, {w:"MILK", e:"🥛"}, {w:"SOUP", e:"🥣"},
        {w:"CORN", e:"🌽"}, {w:"PEAR", e:"🍐"}, {w:"KIWI", e:"🥝"}, {w:"MEAT", e:"🥩"}, {w:"TACO", e:"🌮"},
        {w:"CITY", e:"🏙️"}, {w:"FARM", e:"🚜"}, {w:"HOME", e:"🏠"}, {w:"PARK", e:"🌳"}, {w:"ROAD", e:"🛣️"},
        {w:"SHIP", e:"🚢"}, {w:"TAXI", e:"🚕"}, {w:"BIKE", e:"🚲"}, {w:"VEST", e:"🦺"}, {w:"SHED", e:"🏚️"},
        {w:"GAME", e:"🎮"}, {w:"COIN", e:"🪙"}, {w:"NOTE", e:"📝"}, {w:"CARD", e:"🃏"}, {w:"FLAG", e:"🏁"},
        {w:"PINE", e:"🌲"}, {w:"VINE", e:"🌿"}, {w:"SOIL", e:"🌱"}, {w:"TOOL", e:"🔧"}, {w:"YARD", e:"🏡"}
    ];

    let currentTarget = {}, scores = {p1:0, p2:0}, progress = {p1:0, p2:0};
    let timerInterval, timeLeft = 0, audioCtx = null, musicInterval = null;

    function requestFullScreen() {
        let el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }

    function startMusic() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const notes = [200, 250, 300, 350]; 
        musicInterval = setInterval(() => {
            if (timeLeft <= 0) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(notes[Math.floor(Math.random() * notes.length)], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }, 400);
    }

    function startGame(seconds) {
        requestFullScreen();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('p1-name-tag').innerText = document.getElementById('p1-name-in').value || "P1";
        document.getElementById('p2-name-tag').innerText = document.getElementById('p2-name-in').value || "P2";
        timeLeft = seconds;
        startMusic();
        updateTimer();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimer();
            if (timeLeft <= 0) showVictory();
        }, 1000);
        setupRound();
    }

    function updateTimer() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
    }

    function showVictory() {
        clearInterval(timerInterval);
        clearInterval(musicInterval);
        const p1 = document.getElementById('p1-name-tag').innerText;
        const p2 = document.getElementById('p2-name-tag').innerText;
        let winText = "DRAW!";
        let winColor = "#fff";
        if (scores.p1 > scores.p2) { winText = `${p1} WINS!`; winColor = "var(--p1)"; }
        else if (scores.p2 > scores.p1) { winText = `${p2} WINS!`; winColor = "var(--p2)"; }
        const winEl = document.getElementById('win-text');
        winEl.innerText = winText;
        winEl.style.color = winColor;
        document.getElementById('win-score').innerText = `${p1}: ${scores.p1} | ${p2}: ${scores.p2}`;
        document.getElementById('victory-screen').style.display = 'flex';
    }

    function setupRound() {
        currentTarget = dictionary[Math.floor(Math.random() * dictionary.length)];
        document.getElementById('target-emoji').innerText = currentTarget.e;
        progress = {p1:0, p2:0};

        let jumbled = currentTarget.w.split('');
        while(jumbled.join('') === currentTarget.w) jumbled.sort(() => Math.random() - 0.5);

        ['p1', 'p2'].forEach(p => {
            const hand = document.getElementById(`${p}-hand`);
            const slots = document.getElementById(`${p}-slots`);
            hand.innerHTML = '';
            [...slots.children].forEach(s => { s.innerText = ''; s.classList.remove('filled', 'highlight'); });

            jumbled.forEach(char => {
                const tile = document.createElement('div');
                tile.className = 'letter-tile';
                tile.innerText = char;
                tile.onpointerdown = (e) => {
                    tile.setPointerCapture(e.pointerId);
                    tile.classList.add('dragging');
                    const move = (me) => {
                        tile.style.left = (me.clientX - 42) + 'px';
                        tile.style.top = (me.clientY - 52) + 'px';
                        [...slots.children].forEach(s => {
                            const r = s.getBoundingClientRect();
                            const isOver = me.clientX > r.left && me.clientX < r.right && me.clientY > r.top && me.clientY < r.bottom;
                            s.classList.toggle('highlight', isOver && !s.classList.contains('filled'));
                        });
                    };
                    const up = (ue) => {
                        tile.classList.remove('dragging');
                        tile.onpointermove = null; tile.onpointerup = null;
                        let ok = false;
                        [...slots.children].forEach(s => {
                            const r = s.getBoundingClientRect();
                            if (ue.clientX > r.left && ue.clientX < r.right && ue.clientY > r.top && ue.clientY < r.bottom && !s.classList.contains('filled')) {
                                if (tile.innerText === currentTarget.w[s.dataset.idx]) {
                                    s.innerText = tile.innerText; s.classList.add('filled');
                                    tile.remove(); progress[p]++; ok = true;
                                    if (progress[p] === 4) { scores[p]++; document.getElementById(`${p}-score`).innerText = scores[p]; setupRound(); }
                                }
                            }
                            s.classList.remove('highlight');
                        });
                        if (!ok) { tile.style.position = 'relative'; tile.style.left = '0'; tile.style.top = '0'; }
                    };
                    tile.onpointermove = move;
                    tile.onpointerup = up;
                };
                hand.appendChild(tile);
            });
        });
    }
</script>
</body>
</html>
