<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factor Ninja Duel - Synchronized Edition</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #1a1a1a;
            color: white;
        }

        /* Overlay & UI */
        #overlay, #victory-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
        }

        #victory-screen { display: none; background: rgba(26, 37, 47, 0.98); }

        .name-inputs { display: flex; gap: 20px; margin: 20px 0; }
        .name-inputs input { padding: 10px; font-size: 1.2rem; border-radius: 5px; border: none; text-align: center; }

        .game-btn {
            padding: 15px 40px; font-size: 1.8rem; background: #e74c3c;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            color: white; box-shadow: 0 6px #c0392b; margin: 10px;
            text-decoration: none; display: inline-block;
        }

        .menu-btn { background: #3498db; box-shadow: 0 6px #2980b9; }

        /* Floating Menu Button for Gameplay */
        .floating-menu-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 8px 15px;
            font-size: 1rem;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            z-index: 2000;
            font-weight: bold;
            border-bottom: 3px solid #2980b9;
        }

        #top-bar {
            position: absolute; top: 10px; left: 0; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 30px; z-index: 100;
        }

        #target-display {
            font-size: 3rem; font-weight: bold; color: #f1c40f;
            background: rgba(0,0,0,0.7); padding: 5px 40px; border-radius: 50px;
            border: 3px solid #f1c40f; text-shadow: 0 0 10px #f1c40f;
        }

        #timer { font-size: 2rem; color: #fff; background: #333; padding: 5px 20px; border-radius: 20px; }

        /* Game Sections */
        .player-section {
            flex: 1; position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        #p1-area { border-right: 2px solid #444; background: linear-gradient(to bottom, #1e3c72, #2a5298); }
        #p2-area { background: linear-gradient(to bottom, #7b4397, #dc2430); }

        .score-board { font-size: 2.5rem; font-weight: bold; margin-top: 80px; z-index: 10; }

        /* 3D Bubble Styling */
        .bubble {
            position: absolute;
            width: 80px; height: 80px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.1) 60%, rgba(0, 0, 0, 0.2));
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), 5px 10px 20px rgba(0,0,0,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: bold; color: white;
            cursor: pointer;
            user-select: none;
            animation: floatUp 7s linear forwards; 
        }

        @keyframes floatUp {
            from { transform: translateY(110vh); }
            to { transform: translateY(-20vh); }
        }

        .bubble.correct { background: #2ecc71; box-shadow: 0 0 20px #2ecc71; }
        .bubble.wrong { background: #e74c3c; box-shadow: 0 0 20px #e74c3c; }

        .frozen { filter: grayscale(1) blur(2px); pointer-events: none; }

        .winner-tag { font-size: 4rem; color: #f1c40f; margin-bottom: 10px; text-transform: uppercase; }
        .final-scores { font-size: 2rem; margin-bottom: 30px; }
    </style>
</head>
<body>

<a href="../index.html" class="floating-menu-btn">🏠 HUB</a>

<div id="overlay">
    <h1 style="color:#f1c40f; font-size: 3rem;">FACTOR NINJA Duel ⚔️</h1>
    <p>Fair Play Mode: Both sides get the same numbers!</p>
    <div class="name-inputs">
        <input type="text" id="p1NameInput" placeholder="Ninja 1" value="Player 1">
        <input type="text" id="p2NameInput" placeholder="Ninja 2" value="Player 2">
    </div>
    <button class="game-btn" onclick="startGame()">ENTER THE DOJO</button>
</div>

<div id="victory-screen">
    <h1 class="winner-tag" id="winner-name">WINNER!</h1>
    <div class="final-scores" id="final-stats"></div>
    <div>
        <button class="game-btn" onclick="location.reload()">REMATCH 🔄</button>
        <a href="../../index.html" class="game-btn menu-btn">BACK TO HUB 🏠</a>
    </div>
</div>

<div id="top-bar">
    <div id="target-display">?</div>
    <div id="timer">60s</div>
</div>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

<div id="p1-area" class="player-section">
    <div class="score-board" id="p1-score">0</div>
    <h2 id="p1-display-name">Player 1</h2>
</div>

<div id="p2-area" class="player-section">
    <div class="score-board" id="p2-score">0</div>
    <h2 id="p2-display-name">Player 2</h2>
</div>

<script>
    const music = document.getElementById('bgMusic');
    music.volume = 0.2;
    
    let scores = { 1: 0, 2: 0 };
    let targetNum = 0;
    let gameActive = false;
    let timeLeft = 60;
    let spawnInterval, timerInterval;

    function startGame() {
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        document.getElementById('p1-display-name').textContent = document.getElementById('p1NameInput').value;
        document.getElementById('p2-display-name').textContent = document.getElementById('p2NameInput').value;
        document.getElementById('overlay').style.display = 'none';
        
        music.play();
        gameActive = true;
        scores = { 1: 0, 2: 0 };
        timeLeft = 60;
        
        newTarget();
        spawnInterval = setInterval(syncSpawn, 2000); 
        startTimer();
    }

    function newTarget() {
        const numbers = [12, 16, 18, 20, 24, 30, 36, 40, 48, 50];
        targetNum = numbers[Math.floor(Math.random() * numbers.length)];
        document.getElementById('target-display').textContent = targetNum;
    }

    function syncSpawn() {
        if (!gameActive) return;

        let val;
        if (Math.random() > 0.5) {
            const factors = [];
            for (let i = 1; i <= targetNum; i++) if (targetNum % i === 0) factors.push(i);
            val = factors[Math.floor(Math.random() * factors.length)];
        } else {
            val = Math.floor(Math.random() * (targetNum + 15)) + 2;
            if (targetNum % val === 0) val += 1; 
        }
        const horizontalPos = Math.random() * 70 + 15 + "%";

        createBubble(1, val, horizontalPos);
        createBubble(2, val, horizontalPos);
    }

    function createBubble(playerNum, val, horizontalPos) {
        const area = document.getElementById(`p${playerNum}-area`);
        const b = document.createElement('div');
        b.className = 'bubble';
        b.textContent = val;
        b.style.left = horizontalPos;
        
        b.onclick = () => {
            if (targetNum % val === 0) {
                b.classList.add('correct');
                scores[playerNum] += 10;
            } else {
                b.classList.add('wrong');
                scores[playerNum] -= 5;
                freezePlayer(playerNum);
            }
            document.getElementById(`p${playerNum}-score`).textContent = scores[playerNum];
            setTimeout(() => b.remove(), 200);
        };

        area.appendChild(b);
        setTimeout(() => { if(b.parentNode) b.remove(); }, 7000); 
    }

    function freezePlayer(p) {
        const area = document.getElementById(`p${p}-area`);
        area.classList.add('frozen');
        setTimeout(() => area.classList.remove('frozen'), 1500);
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft + "s";
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function endGame() {
        gameActive = false;
        clearInterval(spawnInterval);
        clearInterval(timerInterval);
        music.pause();
        
        const name1 = document.getElementById('p1-display-name').textContent;
        const name2 = document.getElementById('p2-display-name').textContent;
        let winnerText = "";
        
        if (scores[1] > scores[2]) winnerText = `${name1} IS THE MASTER! 🏆`;
        else if (scores[2] > scores[1]) winnerText = `${name2} IS THE MASTER! 🏆`;
        else winnerText = "IT'S A DRAW! ⚔️";

        document.getElementById('winner-name').textContent = winnerText;
        document.getElementById('final-stats').innerHTML = `${name1}: ${scores[1]} | ${name2}: ${scores[2]}`;
        document.getElementById('victory-screen').style.display = 'flex';
    }
</script>
</body>
</html>
