<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count to 100!</title>
    <style>
        :root {
            --primary: #4CAF50;
            --background: #E8F5E9;
            --text-main: #2E7D32;
            --cell-locked: #CFE8FC;
            --cell-text-locked: #90CAF9;
            --cell-found: #4CAF50;
        }

        * { box-sizing: border-box; font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--background);
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; /* Prevents scrollbars in fullscreen */
        }

        #back-to-menu {
            position: fixed;
            top: 15px;
            left: 15px;
            background-color: #f39c12;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-family: 'Segoe UI', sans-serif;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: transform 0.2s, background 0.2s;
        }
        #back-to-menu:hover {
            background-color: #e67e22;
            transform: translateY(-2px);
        }

        /* --- NEW START SCREEN --- */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--primary);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; color: white;
        }
        #start-screen h1 { font-size: 4rem; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        #btn-start {
            padding: 20px 40px; font-size: 2rem; background-color: white; color: var(--primary);
            border: none; border-radius: 15px; cursor: pointer; font-weight: bold;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2); transition: transform 0.1s;
        }
        #btn-start:active { transform: scale(0.95); }

        #game-container {
            width: 100%; height: 100%; max-width: 900px;
            display: flex; flex-direction: column;
            padding: 20px; background-color: var(--background);
            padding-top: 60px; /* Space for the back button */
        }

        .instruction-area {
            text-align: center; margin-bottom: 20px;
        }
        .instruction-area h1 {
            margin: 0; font-size: 2.5rem; color: var(--text-main);
        }
        .target-box {
            display: inline-block; padding: 10px 30px;
            background: white; border: 4px solid var(--primary);
            border-radius: 15px; font-size: 3rem; font-weight: bold;
            color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 6px; width: 100%; flex-grow: 1;
            max-height: 75vh;
        }

        .cell {
            background-color: var(--cell-locked);
            color: var(--cell-text-locked);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: bold; border-radius: 8px;
            cursor: default; transition: all 0.3s ease;
            user-select: none;
        }

        .cell.active {
            background-color: #FFEB3B; color: #F57F17;
            cursor: pointer; transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 235, 59, 0.8);
            border: 2px solid #FBC02D;
            animation: pulse 1.5s infinite;
        }

        .cell.found {
            background-color: var(--cell-found); color: white;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2);
            transform: scale(1); animation: pop 0.4s ease;
        }

        .cell.error { animation: shake 0.4s ease; }

        #message-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); display: none;
            justify-content: center; align-items: center; flex-direction: column;
            z-index: 100;
        }
        #message-overlay h2 { font-size: 5rem; color: var(--primary); margin: 0; text-align: center; }

        @keyframes pulse { 0% { transform: scale(1.05); } 50% { transform: scale(1.12); } 100% { transform: scale(1.05); } }
        @keyframes pop { 0% { transform: scale(0.8); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>🔢 Count to 100</h1>
    <button id="btn-start" onclick="launchGame()">▶ Play Game</button>
</div>

<a href="../index.html" id="back-to-menu">🏠 Back to Menu</a>

<div id="game-container">
    <div class="instruction-area">
        <h1>Find number:</h1>
        <div class="target-box" id="target-number">1</div>
    </div>
    <div id="grid"></div>
</div>

<div id="message-overlay">
    <h2>🎉 You reached <span id="milestone-num">10</span>! 🎉</h2>
    <button onclick="continueGame()" style="margin-top: 30px; font-size: 2rem; background: var(--primary); color: white; padding: 15px 40px; border-radius: 15px; cursor: pointer; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">Keep Going!</button>
</div>

<script>
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    }

    function playPop() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playError() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function playTada() {
        if (!audioCtx) return;
        const notes = [440, 554.37, 659.25, 880]; 
        notes.forEach((freq, i) => {
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            }, i * 100);
        });
    }

    let currentTarget = 1;
    const grid = document.getElementById('grid');
    const targetDisplay = document.getElementById('target-number');
    const overlay = document.getElementById('message-overlay');
    const milestoneNum = document.getElementById('milestone-num');

    // --- NEW LAUNCH SEQUENCE ---
    function launchGame() {
        // 1. Force Full Screen on the single interaction
        const elem = document.documentElement; 
        if (elem.requestFullscreen) { elem.requestFullscreen(); }
        else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
        else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }

        // 2. Wake up the audio engine
        initAudio();
        playPop();

        // 3. Hide the start screen
        document.getElementById('start-screen').style.display = 'none';
        
        // 4. Start the grid
        initGame();
    }

    function initGame() {
        grid.innerHTML = '';
        currentTarget = 1;
        targetDisplay.innerText = currentTarget;

        for (let i = 1; i <= 100; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = i;
            cell.id = 'cell-' + i;
            
            if (i === 1) cell.classList.add('active');

            cell.onclick = () => handleCellClick(i, cell);
            grid.appendChild(cell);
        }
    }

    function handleCellClick(clickedNum, cellElement) {
        if (clickedNum === currentTarget) {
            cellElement.classList.remove('active');
            cellElement.classList.add('found');
            currentTarget++;

            if (currentTarget > 100) {
                playTada();
                targetDisplay.innerText = "⭐";
                milestoneNum.innerText = "100! You did it!";
                overlay.style.display = "flex";
                return;
            }

            targetDisplay.innerText = currentTarget;
            document.getElementById('cell-' + currentTarget).classList.add('active');

            if ((currentTarget - 1) % 10 === 0) {
                playTada();
                milestoneNum.innerText = (currentTarget - 1);
                overlay.style.display = "flex";
            } else {
                playPop();
            }
        } 
        else if (clickedNum > currentTarget) {
            playError();
            cellElement.classList.add('error');
            setTimeout(() => cellElement.classList.remove('error'), 400);
        }
    }

    function continueGame() {
        playPop(); 
        overlay.style.display = "none";
        if (currentTarget > 100) {
            initGame();
        }
    }
</script>

</body>
</html>
