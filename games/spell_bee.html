<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, landscape-only">
    <title>Spelling Sprint Fullscreen</title>
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #74ebd5 0%, #acb6e5 100%);
        }
        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background: var(--bg-grad);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Overlay to trigger Fullscreen */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-grad);
            z-index: 2000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .stats-bar {
            display: flex; justify-content: space-between;
            width: 90vw; margin-bottom: 10px;
        }

        .stat-box {
            background: white; padding: 10px 25px;
            border-radius: 20px; font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 5px solid #000;
        }

        .game-container {
            display: flex; flex-direction: row; align-items: center;
            justify-content: space-around; background: rgba(255, 255, 255, 0.9);
            padding: 20px; border-radius: 40px; border: 10px solid #000;
            width: 95vw; height: 70vh; position: relative;
        }

        .visual-side { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 15px; }

        #word-image {
            font-size: 130px; background: #fff; width: 200px; height: 200px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 35px; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; border: 5px solid #000;
        }

        .answer-container { display: flex; gap: 12px; }

        .letter-box {
            width: 85px; height: 100px; border: 6px solid #000;
            border-radius: 15px; display: flex; align-items: center;
            justify-content: center; font-size: 65px; background: #fff;
            color: #000; transition: all 0.3s;
        }

        .correct-pop {
            border-color: #2ed573 !important; box-shadow: 0 0 30px #2ed573;
            animation: bounceIn 0.5s forwards; background: #e1fff0 !important;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1.1); }
        }

        .alphabet-grid { flex: 1.5; display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }

        .key {
            width: 65px; height: 65px; color: #000; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; cursor: pointer; border: 4px solid #000;
            font-weight: 900; transition: transform 0.1s;
            box-shadow: 0 6px 0 #000;
        }

        .key:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            align-items: center; justify-content: center; color: white;
            border-radius: 30px; z-index: 100;
        }

        .restart-btn, .start-btn {
            background: #fff; color: #000; font-size: 35px;
            padding: 20px 50px; border-radius: 50px; border: 6px solid #000;
            cursor: pointer; font-family: 'Arial Black';
        }

        /* Small Fullscreen Toggle Icon */
        #fs-toggle {
            position: fixed; bottom: 10px; right: 10px; cursor: pointer;
            background: white; border: 2px solid black; border-radius: 50%;
            width: 40px; height: 40px; display: flex; align-items: center;
            justify-content: center; font-size: 20px; z-index: 3000;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="font-size: 50px; color: #000; margin-bottom: 20px;">SPELLING SPRINT</h1>
        <button class="start-btn" onclick="goFullscreenAndStart()">START GAME 🚀</button>
        <p style="margin-top: 20px;">Tap to play in Full Screen!</p>
    </div>

    <div id="fs-toggle" onclick="toggleFS()">⛶</div>

    <div class="stats-bar">
        <div class="stat-box" id="timer-display">⏳ 60s</div>
        <div class="stat-box" id="score-display">⭐ Score: 0</div>
    </div>

    <div class="game-container">
        <div id="game-over">
            <h1 style="font-size: 60px;">TIME'S UP! ⏰</h1>
            <p id="final-score" style="font-size: 40px;">Score: 0</p>
            <button class="restart-btn" onclick="startGame()">PLAY AGAIN 🔄</button>
        </div>

        <div class="visual-side">
            <div id="word-image" onclick="repeatName()">🐱</div>
            <div class="answer-container">
                <div class="letter-box" id="box0"></div>
                <div class="letter-box" id="box1"></div>
                <div class="letter-box" id="box2"></div>
            </div>
        </div>

        <div class="alphabet-grid" id="alphabet-grid"></div>
    </div>

    <script>
        const wordPool = [
            { word: "CAT", emoji: "🐱" }, { word: "DOG", emoji: "🐶" },
            { word: "SUN", emoji: "☀️" }, { word: "BOX", emoji: "📦" },
            { word: "BUS", emoji: "🚌" }, { word: "HAT", emoji: "🎩" },
            { word: "PEN", emoji: "🖊️" }, { word: "CUP", emoji: "☕" },
            { word: "PIG", emoji: "🐷" }, { word: "BAT", emoji: "🦇" },
            { word: "CAR", emoji: "🚗" }, { word: "TEN", emoji: "🔟" },
            { word: "NET", emoji: "🕸️" }, { word: "FAN", emoji: "🌬️" },
            { word: "POT", emoji: "🏺" }, { word: "BED", emoji: "🛏️" }
        ];

        let shuffledPool = [];
        const colors = ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#A0C4FF', '#BDB2FF', '#FFC6FF'];
        let score = 0, timeLeft = 60, step = 0, currentWord = {}, timerInterval, isPaused = false;
        const synth = window.speechSynthesis;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // FULLSCREEN LOGIC
        function goFullscreenAndStart() {
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            else if (doc.msRequestFullscreen) doc.msRequestFullscreen();

            document.getElementById('start-overlay').style.display = 'none';
            startGame();
        }

        function toggleFS() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function playSound(freq, type, duration, slide = false) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if(slide) osc.frequency.exponentialRampToValueAtTime(slide, audioCtx.currentTime + duration);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function speak(text) {
            if (synth.speaking) synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 0.8;
            synth.speak(utter);
        }

        function repeatName() { if (!isPaused && timeLeft > 0) speak(currentWord.word); }

        function startGame() {
            score = 0; timeLeft = 60; isPaused = false;
            shuffledPool = [...wordPool].sort(() => Math.random() - 0.5);
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('score-display').innerText = "⭐ Score: 0";
            playSound(440, 'sine', 0.5, 880);
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    document.getElementById('timer-display').innerText = `⏳ ${timeLeft}s`;
                    if (timeLeft <= 0) endGame();
                }
            }, 1000);
            nextWord();
        }

        function nextWord() {
            if (shuffledPool.length === 0) shuffledPool = [...wordPool].sort(() => Math.random() - 0.5);
            isPaused = false; step = 0;
            currentWord = shuffledPool.pop();
            document.getElementById('word-image').innerText = currentWord.emoji;
            document.getElementById('word-image').style.transform = "scale(1)";
            for(let i=0; i<3; i++) {
                const b = document.getElementById(`box${i}`);
                b.innerText = ""; b.className = "letter-box";
            }
            speak(currentWord.word);
        }

        function checkLetter(letter) {
            if (timeLeft <= 0 || isPaused) return;
            if (letter === currentWord.word[step]) {
                const box = document.getElementById(`box${step}`);
                box.innerText = letter;
                box.classList.add('correct-pop');
                playSound(600 + (step * 200), 'triangle', 0.2);
                speak(letter);
                step++;
                if (step === 3) {
                    isPaused = true; score++;
                    document.getElementById('score-display').innerText = `⭐ Score: ${score}`;
                    document.getElementById('word-image').style.transform = "scale(1.2) rotate(5deg)";
                    setTimeout(() => playSound(800, 'sine', 0.4, 1200), 100);
                    setTimeout(nextWord, 2000);
                }
            } else {
                playSound(150, 'sawtooth', 0.3, 40);
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-score').innerText = `Score: ${score}`;
            speak("Time is up!");
        }

        const grid = document.getElementById('alphabet-grid');
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach((l, i) => {
            const btn = document.createElement('button');
            btn.className = 'key';
            btn.style.backgroundColor = colors[i % colors.length];
            btn.innerText = l;
            btn.onclick = () => checkLetter(l);
            grid.appendChild(btn);
        });
    </script>
<a href="../index.html" id="back-to-menu">🏠 Back to Menu</a>
<style>
    #back-to-menu {
        position: fixed;
        top: 15px;
        left: 15px;
        background-color: #f39c12;
        color: white;
        padding: 10px 15px;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        font-family: 'Segoe UI', sans-serif;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        z-index: 9999; /* Keeps it on top of everything */
        transition: transform 0.2s, background 0.2s;
    }
    #back-to-menu:hover {
        background-color: #e67e22;
        transform: translateY(-2px);
    }
</style>
</body>
</html>
