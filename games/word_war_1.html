<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORD WAR 1</title>
    <style>
        :root { --p1: #00d2ff; --p2: #ffcc00; }
        body {
            background: #121212; color: white; margin: 0; overflow: hidden;
            font-family: 'Arial Rounded MT Bold', sans-serif;
            user-select: none; touch-action: none;
        }

        /* Screens */
        .screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            background: #121212;
        }
        #game-screen { display: none; position: relative; height: 100vh; width: 100vw; }

        /* Floating Back Button - FIXED LINK */
        .floating-back {
            position: fixed; top: 10px; left: 10px; z-index: 500;
            background: #006064; color: white; padding: 10px 15px;
            border-radius: 8px; text-decoration: none; font-size: 0.9rem;
            border: 2px solid #00acc1; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Victory Overlay */
        #victory-screen {
            display: none; background: rgba(0,0,0,0.95); z-index: 200;
            text-align: center;
        }
        .win-banner { font-size: 6rem; text-shadow: 0 0 30px #fff; margin-bottom: 10px; }
        .win-stats { font-size: 2.5rem; color: #aaa; margin-bottom: 40px; }

        /* Menu Styles */
        h1 { font-size: 5rem; color: #ff4444; text-shadow: 4px 4px #000; margin: 0 0 30px; }
        .input-group { display: flex; gap: 20px; margin-bottom: 20px; }
        input { 
            padding: 15px; font-size: 1.5rem; border-radius: 10px; border: none; 
            background: #333; color: white; text-align: center;
        }
        .menu-btn {
            padding: 20px 40px; font-size: 1.5rem; border-radius: 15px; border: none;
            cursor: pointer; background: #444; color: white; transition: 0.2s;
            text-decoration: none; display: inline-block;
        }
        .menu-btn:hover { transform: scale(1.1); background: #ff4444; }

        /* Game UI */
        #target-zone {
            height: 25vh; background: #222; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-bottom: 5px solid #444;
        }
        #timer-display { font-size: 2.5rem; color: #ff4444; font-family: monospace; margin-bottom: 5px; }
        #target-emoji { font-size: 7.5rem; line-height: 1; }
        
        .score-box { position: absolute; top: 20px; font-size: 1.8rem; text-align: center; }
        
        #battlefield { display: flex; height: 75vh; }
        .player-lane { position: relative; width: 50%; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; }
        .p1-lane { border-right: 4px solid #444; background: #1a1c2c; }
        .p2-lane { background: #2c1a1a; }

        .drop-zone { display: flex; gap: 15px; }
        .slot { width: 115px; height: 135px; border: 5px dashed #555; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 4.5rem; background: rgba(0,0,0,0.4); }
        .slot.filled { border-style: solid; border-color: white; background: rgba(255,255,255,0.2); }
        .slot.highlight { border-color: #fff; background: rgba(255,255,255,0.3); }

        .hand { display: flex; gap: 20px; min-height: 150px; align-items: center; }
        .letter-tile { width: 105px; height: 125px; background: white; color: #222; font-weight: bold; font-size: 4.5rem; display: flex; align-items: center; justify-content: center; border-radius: 15px; border: 6px solid #888; position: relative; cursor: pointer; }
        .letter-tile.dragging { position: fixed; z-index: 9999; pointer-events: none; transform: scale(1.1); box-shadow: 0 10px 40px #000; }
    </style>
</head>
<body>

    <a href="../index.html" class="floating-back">🏠 BACK TO HUB</a>

    <div id="start-screen" class="screen">
        <h1>WORD WAR 1</h1>
        <div class="input-group">
            <input type="text" id="p1-name-in" placeholder="P1 Name" value="P1">
            <input type="text" id="p2-name-in" placeholder="P2 Name" value="P2">
        </div>
        <div class="btn-group">
            <button class="menu-btn" onclick="startGame(60)">1 MIN BATTLE</button>
            <button class="menu-btn" onclick="startGame(120)">2 MIN BATTLE</button>
        </div>
    </div>

    <div id="victory-screen" class="screen">
        <h2 id="win-text" class="win-banner">P1 WINS!</h2>
        <p id="win-score" class="win-stats">Score: 10 to 5</p>
        <button class="menu-btn" style="background: #ff4444;" onclick="location.reload()">PLAY AGAIN</button>
        <a href="Class_Games.html" class="menu-btn" style="background: #006064; margin-top:10px;">EXIT TO HUB</a>
    </div>

    <div id="game-screen">
        <div id="target-zone">
            <div id="timer-display">00:00</div>
            <div class="score-box" style="left: 40px; color: var(--p1);">
                <div id="p1-name-tag">P1</div>
                <div style="font-size: 3.5rem" id="p1-score">0</div>
            </div>
            <div class="score-box" style="right: 40px; color: var(--p2);">
                <div id="p2-name-tag">P2</div>
                <div style="font-size: 3.5rem" id="p2-score">0</div>
            </div>
            <div id="target-emoji">❓</div>
        </div>

        <div id="battlefield">
            <div class="player-lane p1-lane" id="p1-lane">
                <div class="drop-zone" id="p1-slots">
                    <div class="slot" data-idx="0"></div><div class="slot" data-idx="1"></div><div class="slot" data-idx="2"></div>
                </div>
                <div class="hand" id="p1-hand"></div>
            </div>
            <div class="player-lane p2-lane" id="p2-lane">
                <div class="drop-zone" id="p2-slots">
                    <div class="slot" data-idx="0"></div><div class="slot" data-idx="1"></div><div class="slot" data-idx="2"></div>
                </div>
                <div class="hand" id="p2-hand"></div>
            </div>
        </div>
    </div>

<script>
    const dictionary = [
        {w:"CAT", e:"🐱"}, {w:"DOG", e:"🐶"}, {w:"SUN", e:"☀️"}, {w:"BOX", e:"📦"}, {w:"BAT", e:"🦇"},
        {w:"PIG", e:"🐷"}, {w:"BUS", e:"🚌"}, {w:"CUP", e:"☕"}, {w:"HAT", e:"🎩"}, {w:"NET", e:"🕸️"},
        {w:"MAP", e:"🗺️"}, {w:"FAN", e:"🌬️"}, {w:"PEN", e:"🖊️"}, {w:"BED", e:"🛏️"}, {w:"KEY", e:"🔑"},
        {w:"TEN", e:"🔟"}, {w:"RED", e:"🔴"}, {w:"FOX", e:"🦊"}, {w:"OWL", e:"🦉"}, {w:"WIN", e:"🏆"},
        {w:"JAM", e:"🍓"}, {w:"WEB", e:"🌐"}, {w:"LOG", e:"🪵"}, {w:"MOP", e:"🧹"}, {w:"TAP", e:"🚰"},
        {w:"COW", e:"🐄"}, {w:"RAT", e:"🐀"}, {w:"HEN", e:"🐔"}, {w:"HAM", e:"🍖"}, {w:"PIE", e:"🥧"},
        {w:"NUT", e:"🥜"}, {w:"BAG", e:"🛍️"}, {w:"TOY", e:"🧸"}, {w:"BOW", e:"🏹"}, {w:"GUN", e:"🔫"},
        {w:"LIP", e:"👄"}, {w:"EYE", e:"👁️"}, {w:"ARM", e:"🦾"}, {w:"LEG", e:"🦵"}, {w:"TOP", e:"🔝"},
        {w:"HOT", e:"🔥"}, {w:"WET", e:"💦"}, {w:"DRY", e:"🏜️"}, {w:"BIG", e:"🐘"}, {w:"SAD", e:"😢"},
        {w:"SKY", e:"🌌"}, {w:"MUD", e:"💩"}, {w:"OIL", e:"🛢️"}, {w:"GAS", e:"⛽"}, {w:"POT", e:"🍲"},
        {w:"PAN", e:"🍳"}, {w:"CAP", e:"🧢"}, {w:"TIE", e:"👔"}, {w:"ZIP", e:"🤐"}, {w:"DOT", e:"⚫"},
        {w:"INK", e:"✒️"}, {w:"GUM", e:"🍬"}, {w:"VAN", e:"🚐"}, {w:"CAB", e:"🚕"}, {w:"OLD", e:"👴"},
        {w:"NEW", e:"✨"}, {w:"FIT", e:"💪"}, {w:"SIT", e:"🪑"}, {w:"GET", e:"🎁"}, {w:"BUY", e:"💰"},
        {w:"PAY", e:"💸"}, {w:"CUT", e:"✂️"}, {w:"MIX", e:"🥣"}, {w:"FIX", e:"🔧"}, {w:"POP", e:"💥"},
        {w:"NAP", e:"😴"}, {w:"YES", e:"✅"}, {w:"LOW", e:"📉"}, {w:"ZOO", e:"🦓"}, {w:"TEA", e:"🍵"},
        {w:"FLY", e:"🪰"}, {w:"HUG", e:"🫂"}, {w:"LID", e:"🥘"}, {w:"PAD", e:"📝"}, {w:"GEM", e:"💎"}
    ];

    let currentTarget = {}, scores = {p1:0, p2:0}, progress = {p1:0, p2:0};
    let timerInterval, timeLeft = 0, audioCtx = null, musicInterval = null;

    function requestFullScreen() {
        let el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    function startMusic() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const notes = [261, 329, 392, 523]; 
        musicInterval = setInterval(() => {
            if (timeLeft <= 0) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(notes[Math.floor(Math.random() * notes.length)], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }, 300);
    }

    function startGame(seconds) {
        requestFullScreen();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('p1-name-tag').innerText = document.getElementById('p1-name-in').value || "P1";
        document.getElementById('p2-name-tag').innerText = document.getElementById('p2-name-in').value || "P2";
        
        timeLeft = seconds;
        startMusic();
        updateTimer();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimer();
            if (timeLeft <= 0) showVictory();
        }, 1000);
        setupRound();
    }

    function updateTimer() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
    }

    function showVictory() {
        clearInterval(timerInterval);
        clearInterval(musicInterval);
        const p1 = document.getElementById('p1-name-tag').innerText;
        const p2 = document.getElementById('p2-name-tag').innerText;
        
        let winText = "IT'S A TIE!";
        let winColor = "#fff";
        if (scores.p1 > scores.p2) { winText = `${p1} WINS!`; winColor = "var(--p1)"; }
        else if (scores.p2 > scores.p1) { winText = `${p2} WINS!`; winColor = "var(--p2)"; }

        const vicScreen = document.getElementById('victory-screen');
        const winEl = document.getElementById('win-text');
        winEl.innerText = winText;
        winEl.style.color = winColor;
        document.getElementById('win-score').innerText = `${p1}: ${scores.p1} | ${p2}: ${scores.p2}`;
        
        vicScreen.style.display = 'flex';
    }

    function setupRound() {
        currentTarget = dictionary[Math.floor(Math.random() * dictionary.length)];
        document.getElementById('target-emoji').innerText = currentTarget.e;
        progress = {p1:0, p2:0};

        let jumbled = currentTarget.w.split('');
        while(jumbled.join('') === currentTarget.w) jumbled.sort(() => Math.random() - 0.5);

        ['p1', 'p2'].forEach(p => {
            const hand = document.getElementById(`${p}-hand`);
            const slots = document.getElementById(`${p}-slots`);
            hand.innerHTML = '';
            [...slots.children].forEach(s => { s.innerText = ''; s.classList.remove('filled', 'highlight'); });

            jumbled.forEach(char => {
                const tile = document.createElement('div');
                tile.className = 'letter-tile';
                tile.innerText = char;
                tile.onpointerdown = (e) => {
                    tile.setPointerCapture(e.pointerId);
                    tile.classList.add('dragging');
                    const move = (me) => {
                        tile.style.left = (me.clientX - 52) + 'px';
                        tile.style.top = (me.clientY - 62) + 'px';
                        [...slots.children].forEach(s => {
                            const r = s.getBoundingClientRect();
                            const isOver = me.clientX > r.left && me.clientX < r.right && me.clientY > r.top && me.clientY < r.bottom;
                            s.classList.toggle('highlight', isOver && !s.classList.contains('filled'));
                        });
                    };
                    const up = (ue) => {
                        tile.classList.remove('dragging');
                        tile.onpointermove = null; tile.onpointerup = null;
                        let ok = false;
                        [...slots.children].forEach(s => {
                            const r = s.getBoundingClientRect();
                            if (ue.clientX > r.left && ue.clientX < r.right && ue.clientY > r.top && ue.clientY < r.bottom && !s.classList.contains('filled')) {
                                if (tile.innerText === currentTarget.w[s.dataset.idx]) {
                                    s.innerText = tile.innerText; s.classList.add('filled');
                                    tile.remove(); progress[p]++; ok = true;
                                    if (progress[p] === 3) { scores[p]++; document.getElementById(`${p}-score`).innerText = scores[p]; setupRound(); }
                                }
                            }
                            s.classList.remove('highlight');
                        });
                        if (!ok) { tile.style.position = 'relative'; tile.style.left = '0'; tile.style.top = '0'; }
                    };
                    tile.onpointermove = move;
                    tile.onpointerup = up;
                };
                hand.appendChild(tile);
            });
        });
    }
</script>
</body>
</html>
