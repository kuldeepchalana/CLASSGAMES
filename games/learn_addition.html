<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, landscape-only">
    <title>Magic Star Addition</title>
    <style>
        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background: radial-gradient(circle, #ff9a9e 0%, #a1c4fd 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 40px;
            border: 8px solid white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 95vw;
            height: 75vh;
            position: relative;
            z-index: 10;
        }

        /* Party Pop Confetti Styles */
        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
        }

        .math-column { flex: 1; display: flex; flex-direction: column; align-items: center; }

        .vertical-math {
            font-size: 90px;
            font-weight: 900;
            text-align: right;
            border-bottom: 12px solid #333;
            padding: 0 30px;
            position: relative;
            line-height: 1.1;
        }

        .carry-circle {
            position: absolute;
            top: -55px;
            left: 0;
            width: 65px;
            height: 65px;
            background: #FFD700;
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            border: 5px solid #333;
        }

        .answer-row { display: flex; gap: 15px; margin-top: 15px; }

        .ans-input {
            width: 80px; height: 100px; font-size: 70px;
            text-align: center; border: 6px solid #333;
            border-radius: 15px; font-family: 'Arial Black';
        }

        .interaction-column {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .buckets-row { display: flex; justify-content: center; gap: 25px; }

        .bucket {
            background: #fff; border: 5px dashed #1e90ff;
            border-radius: 25px; width: 280px; height: 160px;
            overflow-y: auto; cursor: pointer; padding: 10px;
        }

        .star { font-size: 35px; display: inline-block; margin: 2px; transition: all 0.3s ease; }

        .bounce-star { animation: starBounce 0.6s ease; filter: drop-shadow(0 0 10px gold); }

        @keyframes starBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.8); }
            100% { transform: scale(1.3); }
        }

        .btn-group { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }

        .btn-action { 
            color: white; border: none; padding: 10px 15px; 
            border-radius: 12px; cursor: pointer; font-weight: bold; 
            font-family: 'Arial Black'; font-size: 13px;
        }

        .btn-remove { background: #ff4757; }
        .btn-clear { background: #ffa502; }
        
        .magic-count-btn {
            background: #9b59b6; color: white; font-size: 24px;
            padding: 15px 40px; border-radius: 40px; border: none;
            cursor: pointer; box-shadow: 0 5px 0 #6c3483;
            margin-top: 5px; font-family: 'Arial Black';
        }

        .feedback { font-size: 35px; height: 45px; color: #2ed573; margin-top: 10px; font-weight: bold; }

        .main-btn {
            background: #1e90ff; color: white; font-size: 24px;
            padding: 10px 30px; border-radius: 30px; border: none; cursor: pointer;
        }

    </style>
</head>
<body>

    <h1 style="font-size: 40px; margin: 10px; color: #2c3e50; text-shadow: 2px 2px white;">ਆਓ ਜੋੜ ਕਰਨਾ ਸਿੱਖੀਏ</h1>

    <div id="confetti-container"></div>

    <div class="game-container">
        <div class="math-column">
            <div class="vertical-math">
                <div id="carry" class="carry-circle">1</div>
                <div id="num1" style="color: #007bff;">12</div>
                <div id="num2" style="color: #e84393;">+ 9</div>
            </div>
            <div class="answer-row">
                <input type="number" id="tens-ans" class="ans-input" placeholder="T" oninput="limitOne(this)">
                <input type="number" id="ones-ans" class="ans-input" placeholder="O" oninput="checkAutoCarry(this)">
            </div>
            <div id="feedback" class="feedback"></div>
            <button class="main-btn" onclick="resetGame()" style="margin-top: 10px;">NEXT ➡️</button>
        </div>

        <div class="interaction-column">
            <div class="buckets-row">
                <div style="text-align:center">
                    <div class="bucket" onclick="addStar(1)"><div id="stars1"></div></div>
                    <div class="btn-group">
                        <button class="btn-action btn-remove" onclick="removeStar(1, event)">❌ REMOVE</button>
                        <button class="btn-action btn-clear" onclick="clearBucket(1, event)">🧹 CLEAR</button>
                    </div>
                </div>
                <div style="text-align:center">
                    <div class="bucket" onclick="addStar(2)"><div id="stars2"></div></div>
                    <div class="btn-group">
                        <button class="btn-action btn-remove" onclick="removeStar(2, event)">❌ REMOVE</button>
                        <button class="btn-action btn-clear" onclick="clearBucket(2, event)">🧹 CLEAR</button>
                    </div>
                </div>
            </div>
            <button class="magic-count-btn" onclick="countCombined()">✨ COUNT EVERYTHING ✨</button>
            <p style="text-align:center; font-size: 16px; color: #333; font-weight: bold;">Add stars to each box, then press Magic Count!</p>
        </div>
    </div>

    <script>
        let val1, val2, total, solved = false;
        let count1 = 0, count2 = 0;
        const synth = window.speechSynthesis;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function speak(text) {
            if (synth.speaking) synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'en-US';
            utter.pitch = 1.2;
            utter.rate = 0.7;
            synth.speak(utter);
        }

        // PARTY POP EFFECT
        function createPartyPop() {
            const container = document.getElementById('confetti-container');
            const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#e84393', '#9b59b6'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = '50%';
                confetti.style.top = '50%';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 5 + Math.random() * 15;
                const xVel = Math.cos(angle) * velocity;
                const yVel = Math.sin(angle) * velocity;
                
                container.appendChild(confetti);
                
                let x = 50;
                let y = 50;
                let opacity = 1;

                const animation = setInterval(() => {
                    x += xVel;
                    y += yVel;
                    opacity -= 0.02;
                    confetti.style.transform = `translate(${x - 50}px, ${y - 50}px)`;
                    confetti.style.opacity = opacity;
                    
                    if (opacity <= 0) {
                        clearInterval(animation);
                        confetti.remove();
                    }
                }, 20);
            }
        }

        function playApplause() {
            createPartyPop(); // Trigger visual pop with sound
            for(let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.frequency.setValueAtTime(200 + Math.random() * 600, audioCtx.currentTime);
                    osc.connect(g); g.connect(audioCtx.destination);
                    g.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
                }, i * 50);
            }
        }

        function addStar(n) {
            const container = document.getElementById(`stars${n}`);
            const star = document.createElement('span');
            star.className = 'star';
            star.innerText = n === 1 ? '⭐' : '🌟';
            container.appendChild(star);
            if(n === 1) { count1++; speak(count1); } else { count2++; speak(count2); }
        }

        function clearBucket(n, e) {
            e.stopPropagation();
            document.getElementById(`stars${n}`).innerHTML = '';
            if(n === 1) count1 = 0; else count2 = 0;
            speak("Box cleared");
        }

        async function countCombined() {
            const allStars = document.querySelectorAll('.star');
            if (allStars.length === 0) return;
            speak("Let's count them all together!");
            await new Promise(r => setTimeout(r, 1500));
            for (let i = 0; i < allStars.length; i++) {
                const star = allStars[i];
                star.classList.add('bounce-star');
                speak(i + 1);
                await new Promise(r => setTimeout(r, 1000));
                star.style.transform = "scale(1.3)";
            }
            speak("The total is " + allStars.length);
        }

        function removeStar(n, e) {
            e.stopPropagation();
            const container = document.getElementById(`stars${n}`);
            if (container.lastChild) {
                container.removeChild(container.lastChild);
                if(n === 1) count1--; else count2--;
            }
        }

        function checkAutoCarry(input) {
            if (input.value.length > 1) {
                input.value = input.value % 10;
                document.getElementById('carry').style.display = 'flex';
                speak("One carry received!"); 
                document.getElementById('tens-ans').focus();
            }
            checkFinal();
        }

        function limitOne(input) {
            if (input.value.length > 2) input.value = input.value.slice(0,2);
            checkFinal();
        }

        function checkFinal() {
            if (solved) return;
            const t = document.getElementById('tens-ans').value;
            const o = document.getElementById('ones-ans').value;
            if (t !== "" && o !== "") {
                if (parseInt(t + o) === total) {
                    solved = true;
                    document.getElementById('feedback').innerText = "👏 EXCELLENT! 👏";
                    playApplause();
                    speak("Excellent! You got it right!");
                }
            }
        }

        function resetGame() {
            val1 = Math.floor(Math.random() * 10) + 5;
            val2 = Math.floor(Math.random() * 8) + 5;
            total = val1 + val2;
            count1 = 0; count2 = 0; solved = false;
            document.getElementById('num1').innerText = val1;
            document.getElementById('num2').innerText = "+ " + val2;
            document.getElementById('stars1').innerHTML = '';
            document.getElementById('stars2').innerHTML = '';
            document.getElementById('tens-ans').value = '';
            document.getElementById('ones-ans').value = '';
            document.getElementById('carry').style.display = 'none';
            document.getElementById('feedback').innerText = '';
        }
        resetGame();
    </script>
<a href="../index.html" id="back-to-menu">🏠 Back to Menu</a>
<style>
    #back-to-menu {
        position: fixed;
        top: 15px;
        left: 15px;
        background-color: #f39c12;
        color: white;
        padding: 10px 15px;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        font-family: 'Segoe UI', sans-serif;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        z-index: 9999; /* Keeps it on top of everything */
        transition: transform 0.2s, background 0.2s;
    }
    #back-to-menu:hover {
        background-color: #e67e22;
        transform: translateY(-2px);
    }
</style>
</body>
</html>
